name: Build and Release Standalone Executables

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyautogui pyperclip openpyxl xlwings pyinstaller

      - name: Compile with PyInstaller
        run: |
          pyinstaller --clean --onefile --noconsole --name "CIS_SMS_Macro_Windows" app.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v3
        with:
          name: windows-bin
          path: dist/CIS_SMS_Macro_Windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyautogui pyperclip openpyxl xlwings pyinstaller

      - name: Compile with PyInstaller
        run: |
          pyinstaller --clean --onefile --windowed --name "CIS_SMS_Macro_Mac" app.py

      - name: Compress macOS Bundle
        run: |
          cd dist
          zip -r ../CIS_SMS_Macro_Mac.zip CIS_SMS_Macro_Mac.app

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v3
        with:
          name: macos-bin
          path: CIS_SMS_Macro_Mac.zip

  publish-release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Download Windows Artifact
        uses: actions/download-artifact@v3
        with:
          name: windows-bin
          path: release-files/

      - name: Download macOS Artifact
        uses: actions/download-artifact@v3
        with:
          name: macos-bin
          path: release-files/

      - name: Create or Update GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release (if it exists) to prevent conflict
          gh release delete latest --yes || true
          
          # Create new release
          gh release create latest \
            release-files/CIS_SMS_Macro_Windows.exe \
            release-files/CIS_SMS_Macro_Mac.zip \
            --title "Latest Standalone Release" \
            --notes "GitHub Actions에 의해 자동 빌드된 최신 무설치 실행 파일입니다. (Windows용 .exe 및 macOS용 .zip)" \
            --target main
